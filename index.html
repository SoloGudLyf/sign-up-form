<!DOCTYPE html>
<html lang="en">
  <head>
    <meta charset="UTF-8" />
    <meta name="viewport" content="width=device-width, initial-scale=1.0" />
    <title>Sign Up Form</title>
    <link rel="stylesheet" href="styles.css" />
  </head>
  <body>
    <div class="container">
      <div class="left-panel">
        <div class="odin-logo">
          <img src="./img/odin-lined.png" alt="Odin Logo" />
          <h1>ODIN</h1>
        </div>
        <p class="credit">
          Photo by
          <a
            href="https://unsplash.com/photos/green-leaf-plant-in-close-up-photography-25xggax4bSA"
            >Halie West</a
          >
          on Unsplash
        </p>
      </div>
      <div class="right-panel">
        <header>
          <p>
            This is not a real online service! You know you need something
            <span>
              like this in your life to help you realize your deepest dreams.
            </span>
            <span>Sign up <em>now</em> to get started.</span>
            <span class="last-elem">You <em>know</em> you want to.</span>

          </p>
        </header>
        <main>
          <h2>Let's do this!</h2>
          <form action="#" method="post">
              <div class="form-elems">
                <label class="form-elem" for="first-name">FIRST NAME
                <input type="text" id="first-name" name="fname" required /></label>
                <label class="form-elem" for="last-name">LAST NAME
                <input type="text" id="last-name" name="lname" required /></label>
                <label class="form-elem" for="email">EMAIL
                <input
                  type="email"
                  id="email"
                  name="email"
                  placeholder="example@email.com"
                  required
                /></label>
                <label class="form-elem" for="phone-number">PHONE NUMBER
                <input
                  type="tel"
                  name="tel"
                  id="phone-number"
                  pattern="[0-9]{3}-[0-9]{3}-[0-9]{4}"
                  required
                  placeholder="xxx-xxx-xxxx"
                /></label>
                <label class="form-elem" for="password">PASSWORD
                <input type="password" name="password" id="password" required /></label>
                <label class="form-elem" for="confirm-password">CONFIRM PASSWORD
                <input
                  type="password"
                  name="confirm-password"
                  id="confirm-password"
                  required
                /></label>
              </div>
            <hr />

            <button type="submit">Create Account</button>
          </form>
        </main>
        <footer>
          <p>Already have an account? <a href="#">Log in</a></p>
        </footer>
      </div>
    </div>
  </body>
</html>
