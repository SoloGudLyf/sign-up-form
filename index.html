<!DOCTYPE html>
<html lang="en">
  <head>
    <meta charset="UTF-8" />
    <meta name="viewport" content="width=device-width, initial-scale=1.0" />
    <title>Sign Up Form</title>
    <link rel="stylesheet" href="styles.css" />
  </head>
  <body>
    <div class="container">
      <div class="left-panel">
        <div class="odin-logo">
          <img src="/img/odin-lined.png" alt="" />
          <h1>ODIN</h1>
        </div>
        <p class="credit">Photo by <a href="https://unsplash.com/photos/green-leaf-plant-in-close-up-photography-25xggax4bSA">Halie West</a> on Unsplash</p>
      </div>
      <div class="right-panel">
        <header>
          <p>
            This is not a real online service! You know you need something <span>
              like this
              in your life to help you realize your deepest dreams.
            </span>
            <span>Sign up <em>now</em> to get started.</span>
          </p>
          <p>You <em>know</em> you want to.</p>
        </header>
        <main>
          <h2>Let's do this!</h2>
          <form action="#" method="post">
            <div class="form-elem">
              <label for="first-name">FIRST NAME</label>
              <input type="text" id="first-name" name="fname" />
            </div>
            <div class="form-elem">
              <label for="last-name">LAST NAME</label>
              <input type="text" id="last-name" name="lname" />
            </div>
            <div class="form-elem">
              <label for="email">EMAIL</label>
              <input
                type="email"
                id="email"
                name="email"
                placeholder="example@email.com"
              />
            </div>
            <div class="form-elem">
              <label for="phone-number">PHONE NUMBER</label>
              <input type="tel" name="tel" id="phone-number" />
            </div>
            <div class="form-elem">
              <label for="password">PASSWORD</label>
              <input type="password" name="password" id="password" />
            </div>
            <div class="form-elem">
              <label for="confirm-password">CONFIRM PASSWORD</label>
              <input
                type="password"
                name="confirm-password"
                id="confirm-password"
              />
            </div>
          </form>
        </main>
        <footer>
          <button>Create Account</button>
          <p>Already have an account? <a href="#">Log in</a></p>
        </footer>
      </div>
    </div>
  </body>
</html>
